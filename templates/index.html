<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<!-- 🔥 الحل الحقيقي -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content">

<title>Zavix AI</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="stylesheet" href="/static/style.css">

<!-- 🔥 منع الكاش القديم -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- ❌ حذفنا body fixed لأنه يسبب المشكلة -->
<style>
body {
  width: 100%;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="header-left">
        
        <!-- ☰ -->
        <div class="menu-icon">
            <span></span>
            <span></span>
        </div>

        <!-- الاسم -->
        <h3>Zavix AI</h3>

        <!-- ⭐ الاشتراك -->
        <div class="plus-badge">⭐ Plus Sign up</div>

        <!-- 🔥 الرسائل المؤقتة -->
        <div class="temp-msg-btn"></div>

    </div>

</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox">
    <div class="bot-msg">👋 مرحباً! كيف أساعدك؟</div>
</div>

<!-- 🔥 input وهمي -->
<input type="text" style="position:absolute; top:-9999px; opacity:0;">

<!-- INPUT -->
<div class="input-container">
    <div class="input-box">
        <button class="plus-btn">+</button>

        <div 
          id="userInput" 
          contenteditable="true"
          class="editable-input"
          data-placeholder="اسأل Zavix AI أي شيء..."
        ></div>

        <button id="sendBtn" class="send">↑</button>
    </div>
</div>

<script src="/static/script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/sw.js?v=999")
    .then(() => console.log("Service Worker Registered"))
    .catch((err) => console.log("SW Error:", err));
}
</script>

</body>
</html>
