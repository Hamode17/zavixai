<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Zavix AI</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="menu-icon">
                <span></span>
                <span></span>
            </div>
            <h3>Zavix AI</h3>
            <div class="plus-badge">⭐ Plus Sign up</div>
            <div class="temp-msg-btn"></div>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-box" id="chatBox">
        <div class="bot-msg">👋 مرحباً! كيف أساعدك؟</div>
    </div>

    <!-- INPUT -->
    <div class="input-container">
        <div class="input-box">
            <button class="plus-btn">+</button>

            <div 
                id="userInput" 
                contenteditable="true"
                class="editable-input"
                data-placeholder="اسأل Zavix AI أي شيء..."
            ></div>

            <button id="sendBtn" class="send">↑</button>
        </div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
