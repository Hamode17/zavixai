<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<!-- 🔥 مهم جداً للتوافق العالمي -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Zavix AI</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">

        <!-- يسار -->
        <div class="header-left">

            <div class="menu-icon">
                <span></span>
                <span></span>
            </div>

            <!-- 🔥 لفينا الاسم داخل div للتحكم بالمسافة بدقة -->
            <div class="title-wrapper">
                <h3>Zavix AI</h3>
            </div>

        </div>

        <!-- يمين -->
        <div class="header-right">

            <!-- 🔥 لفينا الاشتراك -->
            <div class="plus-wrapper">
                <div class="plus-badge">⭐ Plus Sign up</div>
            </div>

            <!-- 🔥 الرسالة المؤقتة -->
            <div class="temp-msg-btn"></div>

        </div>

    </div>

    <!-- CHAT -->
    <div class="chat-box" id="chatBox">
        <div class="bot-msg">👋 مرحباً! كيف أساعدك؟</div>
    </div>

    <!-- INPUT -->
    <div class="input-container">
        <div class="input-box">

            <button class="plus-btn">+</button>

            <div 
                id="userInput" 
                contenteditable="true"
                class="editable-input"
                data-placeholder="اسأل Zavix AI أي شيء..."
                autocapitalize="off"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
            ></div>

            <button id="sendBtn" class="send">↑</button>

        </div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
