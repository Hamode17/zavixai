<!DOCTYPE html>  <html lang="ar">  
<head>  
<meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">  <title>Zavix AI</title>  <link rel="stylesheet" href="/static/style.css">  </head>  <body>  <div class="app">  <!-- HEADER -->  
<div class="header">  

    <!-- يسار -->  
    <div class="header-left">  
        <div class="menu-icon">  
            <span></span>  
            <span></span>  
        </div>  
    </div>  

    <!-- 🔥 الوسط -->  
    <div class="header-center">  

        <div class="title-wrapper">  
            <h3>Zavix AI</h3>  
            <span class="dropdown-icon">▾</span>  
        </div>  

        <!-- 🔥 زر الاشتراك (مطور) -->  
        <div class="plus-badge">  
            <span class="plus-icon">✨</span>  
            <span class="plus-text">  
                <span class="en">Plus</span>  
                <span class="ar">اشتراك في</span>  
            </span>  
        </div>  

    </div>  

    <!-- يمين -->  
    <div class="header-right">  
        <div class="temp-msg-btn"></div>  
    </div>  

</div>  

<!-- CHAT -->  
<div class="chat-box" id="chatBox">  
    <div class="bot-msg">👋 مرحباً! كيف أساعدك؟</div>  
</div>  

<!-- INPUT -->  
<div class="input-container">  
    <div class="input-box">  

        <button class="plus-btn">+</button>  

        <div   
            id="userInput"   
            contenteditable="true"  
            class="editable-input"  
            data-placeholder="اسأل Zavix AI أي شيء..."  
            autocapitalize="off"  
            autocomplete="off"  
            autocorrect="off"  
            spellcheck="false"  
        ></div>  

        <button id="sendBtn" class="send">↑</button>  

    </div>  
</div>

</div>  <script src="/static/script.js"></script>  </body>  
</html>
