<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zavix AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="left">
        ☰ Zavix AI
    </div>
    <div class="right">
        <button class="plus">✨ Upgrade</button>
    </div>
</div>

<!-- 💬 CHAT -->
<div id="chat-box" class="chat-box"></div>

<!-- INPUT -->
<div class="input-container">

    <!-- قائمة زر + -->
    <div class="plus-menu" id="plusMenu">
        <button>📷 التقاط صورة</button>
        <button>🖼️ رفع صورة</button>
        <button>📄 رفع ملف</button>
        <button>🎨 إنشاء صورة</button>
    </div>

    <div class="input-box">

        <!-- زر الإرسال (يمين) -->
        <button class="send" id="sendBtn">↑</button>

        <!-- الإدخال -->
        <input id="messageInput" placeholder="اسأل Zavix AI أي شيء...">

        <!-- زر + (يسار) -->
        <button class="plus-btn" id="plusBtn">＋</button>

    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
