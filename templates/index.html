<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zavix AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="header">
    <div class="left">☰ Zavix AI</div>
    <div class="right">
        <button class="plus">✨ Upgrade</button>
    </div>
</header>

<main id="chat-box" class="chat-box"></main>

<div class="input-container">

    <div class="plus-menu" id="plusMenu">
        <button>📷 التقاط صورة</button>
        <button>🖼️ رفع صورة</button>
        <button>📄 رفع ملف</button>
        <button>🎨 إنشاء صورة</button>
    </div>

    <div class="input-box">
        <button class="send" id="sendBtn">↑</button>
        <input id="messageInput" placeholder="اسأل Zavix AI أي شيء...">
        <button class="plus-btn" id="plusBtn">＋</button>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
