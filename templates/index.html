<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Zavix AI</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="header-left">
        
        <!-- ☰ -->
        <div class="menu-icon">
            <span></span>
            <span></span>
        </div>

        <!-- الاسم -->
        <h3>Zavix AI</h3>

        <!-- ⭐ الاشتراك -->
        <div class="plus-badge">⭐ Plus Sign up</div>

        <!-- 🔥 الرسائل المؤقتة (مكان جديد) -->
        <div class="temp-msg-btn"></div>

    </div>

</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox">
    <div class="bot-msg">👋 مرحباً! كيف أساعدك؟</div>
</div>

<!-- INPUT -->
<div class="input-container">
    <div class="input-box">
        <button class="plus-btn">+</button>
        <input id="userInput" type="text" placeholder="اسأل Zavix AI أي شيء...">
        <button id="sendBtn" class="send">↑</button>
    </div>
</div>

<script src="/static/script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("Service Worker Registered"))
    .catch((err) => console.log("SW Error:", err));
}
</script>

</body>
</html>
