<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول | Zavix AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f7f7f8;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    padding: 30px;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
}

a {
    display: block;
    margin-top: 15px;
    color: #10a37f;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="container">
    <div class="box">
        <h2>تسجيل الدخول إلى Zavix AI</h2>

        <form method="POST">
            <input name="email" placeholder="البريد الإلكتروني">
            <input name="password" type="password" placeholder="كلمة المرور">
            <button>دخول</button>
        </form>

        <a href="/register">إنشاء حساب جديد</a>
    </div>
</div>

</body>
</html>
